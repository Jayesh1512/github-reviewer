name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: SKIP_ENV_VALIDATION=1 DATABASE_URL=postgresql://ci:ci@localhost:5432/ci NEXTAUTH_SECRET=ci-secret-at-least-32-characters-long NEXTAUTH_URL=http://localhost:3000 NEXT_PUBLIC_APP_URL=http://localhost:3000 GITHUB_CLIENT_ID=ci GITHUB_CLIENT_SECRET=ci GEMINI_API_KEY=ci pnpm build
